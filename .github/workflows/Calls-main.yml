# This is a basic workflow to help you get started with Actions

name: Cocoapods CD

on:
  push:
    tags:
      - 'Calls-*'

jobs:
  build:
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installing Cocoapods
        run: gem install cocoapods

      - name: Normalize XCFramework permissions
        run: |
          find . -name "*.xcframework" -type d | while read xcframework; do
            chmod -R u+rwX,go+rX "$xcframework"
            find "$xcframework" -type d -exec chmod 755 {} \;
            find "$xcframework" -type f -exec chmod 644 {} \;
          done

          find . -path "*.xcframework/**/*.framework/*" -type f | while read f; do
            chmod u+w "$f" || true
          done

      - name: Pushing to Cocoapods
        env:
          COCOAPODS_TRUNK_TOKEN: ${{ secrets.SALESIQ_MOBILISTEN_IOS_COCOAPODS_TRUNK_TOKEN }}
        run: |
          set -eo pipefail
          pod trunk push MobilistenCalls.podspec --verbose
